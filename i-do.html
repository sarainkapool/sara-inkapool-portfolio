<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sara Inkapööl</title>
    <link rel="stylesheet" href="assets/styles/main.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script
      src="https://kit.fontawesome.com/22aa7267da.js"
      crossorigin="anonymous"
    ></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Amaranth:ital,wght@0,400;0,700;1,400;1,700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="background text-body px-6 md:px-12 lg:px-20 min-h-svh">
    <header class="text-body">
      <nav class="py-6 md:py-8 flex items-center justify-between gap-4">
        <a
          href="index.html"
          class="uppercase text-base sm:text-lg md:text-2xl shrink-0"
        >
          Ink UX
        </a>

        <ul
          class="flex flex-wrap items-center justify-end gap-x-3 gap-y-2 sm:gap-x-4 md:gap-x-6 uppercase text-base sm:text-lg md:text-2xl"
        >
          <li><a href="i-do.html">I do</a></li>
          <li>
            <a
              href="https://www.linkedin.com/in/sarainkapool/"
              target="_blank"
              rel="noopener noreferrer"
            >
              <i class="fa-brands fa-linkedin-in"></i>
              <span class="sr-only">LinkedIn</span>
            </a>
          </li>
          <li>
            <a
              href="mailto:sara@inkapool.com"
              target="_blank"
              rel="noopener noreferrer"
            >
              <i class="fa-regular fa-envelope"></i>
              <span class="sr-only">Email</span>
            </a>
          </li>
          <li class="gradient py-1.5 px-3 md:py-2 md:px-4 rounded-lg">
            <a
              href="/assets/Inkapööl-Sara_CV.pdf"
              target="_blank"
              rel="noopener noreferrer"
            >
              CV
            </a>
          </li>
        </ul>
      </nav>
    </header>
    <main class="hero">
      <h1
        class="name text-5xl sm:text-6xl md:text-7xl lg:text-8xl uppercase my-4 md:my-6"
      >
        Sara Inkapööl
      </h1>
      <div class="content">
        <section class="hero-intro">
          <div class="hero-copy">
            <p class="tagline">
              <span>an economist turned</span>
              <span>UX Designer</span>
            </p>
          </div>
        </section>
        <img
          class="hero-image"
          src="assets/img/sara-inkapool.png"
          alt="Sara Inkapööl"
        />

        <section id="contact-card" class="p-9 md:p6 rounded-2xl">
          <h2 class="text-2xl md:text-3xl uppercase mb-4">Get in touch</h2>
          <form class="contact-form">
            <div class="contact-field">
              <label for="name" class="block mb-2">Name:</label>
              <input
                type="text"
                id="name"
                name="name"
                class="w-full p-2 mb-4 border border-gray-300 rounded"
                placeholder="Kim Doe"
              />
            </div>
            <div class="contact-field">
              <label for="email" class="block mb-2">Email:</label>
              <input
                type="email"
                id="email"
                name="email"
                class="w-full p-2 mb-4 border border-gray-300 rounded"
                placeholder="kim@doe.com"
              />
            </div>
            <div class="contact-field">
              <label for="message" class="block mb-2">Message:</label>
              <textarea
                id="message"
                name="message"
                rows="4"
                class="w-full p-2 mb-4 border border-gray-300 rounded"
                placeholder="I want to work with you, Sara, because..."
              ></textarea>
            </div>
            <div class="contact-actions">
              <button type="submit" class="contact-button">Send</button>
            </div>
          </form>
        </section>
      </div>
    </main>
    <footer class="text-body py-8 text-center">
      <p class="text-sm opacity-55">
        &copy; 2026 Sara Inkapööl. All rights reserved.
      </p>
    </footer>
  </body>
</html>
